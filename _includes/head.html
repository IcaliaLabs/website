  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <meta name="description" content="{{ description }}">
  <link rel="canonical" href="https://icalialabs.com{{ canonicalPath }}">
  <link rel="icon" type="image/x-icon" href="https://icalialabs.com/assets/favicon.ico">
  <link rel="shortcut icon" type="image/x-icon" href="https://icalialabs.com/assets/favicon.ico">

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-MSFD00QMYY"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-MSFD00QMYY', {
      'page_path': '{{ canonicalPath }}',
      'anonymize_ip': true,
      'cookie_expires': 63072000
    });
  </script>
  <script src="/js/ga-events.js" defer></script>

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://icalialabs.com{{ canonicalPath }}">
  <meta property="og:title" content="{{ title }}">
  <meta property="og:description" content="{{ ogDescription or description }}">
  <meta property="og:image" content="https://icalialabs.com{{ ogImage or '/assets/og-image.png' }}">
  <meta name="twitter:card" content="{{ twitterCard or 'summary' }}">
  <meta name="twitter:title" content="{{ title }}">
  <meta name="twitter:description" content="{{ twitterDescription or ogDescription or description }}">
  <meta name="twitter:image" content="https://icalialabs.com{{ ogImage or '/assets/og-image.png' }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'icalia-red': '#E8453C',
            'icalia-red-dark': '#C53B33',
            'icalia-dark': '#1A1A22',
            'icalia-navy': '#2D2F40',
            'icalia-warm': '#FAF8F6',
            'icalia-warm-2': '#F3F0EC',
            'icalia-blush': '#FDECED',
            'icalia-sand': '#E8E4DF',
          },
          fontFamily: {
            'display': ['"Instrument Serif"', 'Georgia', 'serif'],
            'body': ['"DM Sans"', 'system-ui', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style>
    html { scroll-behavior: smooth; }
    .reveal { opacity: 0; transform: translateY(32px); transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }
    @media (min-width: 768px) {
      .industries-dropdown:hover .industries-panel { opacity: 1; visibility: visible; transform: translateY(0); }
    }
  </style>
